spring.application.name=APIGateway
server.port=8086

#route configuration for the services

spring.cloud.gateway.routes[0].id=QUIZSERVICE
spring.cloud.gateway.routes[0].uri=lb://QUIZSERVICE
spring.cloud.gateway.routes[0].predicates=Path=/api/quiz/**


spring.cloud.gateway.routes[1].id=QUESTIONSERVICE
spring.cloud.gateway.routes[1].uri=lb://QUESTIONSERVICE
spring.cloud.gateway.routes[1].predicates=Path=/api/question/**
#spring.cloud.gateway.routes[1].filters=StripPrefix=1
